<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云端直供台 | PDF Admin</title>
    <script src="pdf/js/qrcode.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--panel-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 8px;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        input[type="password"],
        input[type="text"],
        input[type="file"] {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background-color: rgba(0, 0, 0, 0.2);
            color: white;
            box-sizing: border-box;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="password"]:focus,
        input[type="text"]:focus {
            border-color: var(--accent);
        }

        .token-help {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 6px;
            display: block;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 10px;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
        }

        #status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
            text-align: center;
        }

        #qr-container {
            display: none;
            margin-top: 30px;
            text-align: center;
            background: white;
            padding: 20px;
            border-radius: 12px;
        }

        #qr-container canvas {
            max-width: 100%;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        .qr-link {
            color: var(--accent);
            word-break: break-all;
            font-size: 13px;
            text-decoration: none;
            display: block;
            margin-top: 10px;
        }

        .qr-link:hover {
            text-decoration: underline;
        }

        .success-bg {
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .error-bg {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .step-hidden {
            display: none;
        }

        .divider {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin: 25px 0;
        }

        .step-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>直链分发中心</h1>
        <p class="subtitle">无服务器架构自动汇编</p>

        <!-- Token 区域 -->
        <div class="form-group">
            <label for="gh-token">GitHub Token (PAT)</label>
            <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
            <span class="token-help">安全策略：仅保存在您的浏览器本地缓存中。</span>
        </div>

        <hr class="divider">

        <!-- 步骤一：输入编号，生成二维码 -->
        <div id="step1">
            <div class="step-label">步骤一：生成二维码</div>
            <div class="form-group">
                <label for="file-number">文件编号</label>
                <input type="text" id="file-number" placeholder="例如：SN202600118W">
            </div>
            <button id="qr-btn" onclick="generateQR()">📎 生成二维码</button>
        </div>

        <!-- 二维码显示区 -->
        <div id="qr-container">
            <canvas id="qr-canvas"></canvas>
            <div style="color: #333; font-weight: 600; margin-bottom: 5px;">扫码查看或分享此链接：</div>
            <a id="qr-url" class="qr-link" target="_blank" href=""></a>
        </div>

        <!-- 步骤二：上传 PDF（步骤一完成后才显示） -->
        <div id="step2" class="step-hidden">
            <hr class="divider">
            <div class="step-label">步骤二：上传 PDF 文件</div>
            <div class="form-group">
                <label for="pdf-file">选择 PDF（文件将自动重命名为 <strong id="target-name-hint"></strong>）</label>
                <input type="file" id="pdf-file" accept="application/pdf">
            </div>
            <button id="upload-btn" onclick="startUpload()">🚀 上传到仓库</button>
        </div>

        <div id="status"></div>
    </div>

    <script>
        const REPO_OWNER = 'Victor9578';
        const REPO_NAME = 'ZMDH_Qrcode';
        const BASE_URL = 'https://zmdh.jaywxl.eu.org/pdf/#';

        let currentFileNumber = '';

        // 初始化：从 localStorage 加载 Token
        document.addEventListener("DOMContentLoaded", () => {
            const savedToken = localStorage.getItem('gh_token');
            if (savedToken) {
                document.getElementById('gh-token').value = savedToken;
            }
        });

        function showStatus(msg, type) {
            const el = document.getElementById('status');
            el.style.display = 'block';
            el.className = type === 'success' ? 'success-bg' : 'error-bg';
            el.innerText = msg;
        }

        function hideStatus() {
            document.getElementById('status').style.display = 'none';
        }

        // ========== 步骤一：生成二维码 ==========
        function generateQR() {
            const fileNumber = document.getElementById('file-number').value.trim();
            if (!fileNumber) return showStatus("❌ 请输入文件编号", "error");

            hideStatus();
            currentFileNumber = fileNumber;

            const finalUrl = BASE_URL + encodeURIComponent(fileNumber);

            // 渲染二维码：黑白、version 7、高容错
            const canvas = document.getElementById('qr-canvas');
            QRCode.toCanvas(canvas, finalUrl, {
                version: 7,
                errorCorrectionLevel: 'H',
                width: 300,
                margin: 2,
                color: {
                    dark: "#000000",
                    light: "#ffffff"
                }
            }, function (error) {
                if (error) {
                    console.error(error);
                    return showStatus("❌ 二维码生成失败: " + error.message, "error");
                }
            });

            // 显示链接
            const linkEl = document.getElementById('qr-url');
            linkEl.href = finalUrl;
            linkEl.innerText = finalUrl;

            // 显示二维码区域
            document.getElementById('qr-container').style.display = 'block';

            // 显示步骤二，并在标签上告知目标文件名
            const targetName = fileNumber + '.pdf';
            document.getElementById('target-name-hint').innerText = targetName;
            document.getElementById('step2').classList.remove('step-hidden');
        }

        // ========== 步骤二：上传文件（重命名为编号） ==========
        async function startUpload() {
            const tokenInput = document.getElementById('gh-token').value.trim();
            const fileInput = document.getElementById('pdf-file').files[0];
            const btn = document.getElementById('upload-btn');

            if (!tokenInput) return showStatus("❌ 请输入 GitHub Token", "error");
            if (!fileInput) return showStatus("❌ 请先选择一个 PDF 文件", "error");
            if (!currentFileNumber) return showStatus("❌ 请先完成步骤一", "error");

            // 记住 Token
            localStorage.setItem('gh_token', tokenInput);

            // 不管原始文件名是啥，目标名称强制使用编号
            const targetFilename = currentFileNumber + '.pdf';
            const encodedName = encodeURIComponent(targetFilename);
            const apiUrl = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/pdf/${encodedName}`;

            btn.innerText = "⏳ 正在分析文件...";
            btn.disabled = true;
            showStatus('正在准备上传，请不要关闭网页...', 'success');

            try {
                // 1. 读取文件转成 Base64
                const base64Content = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(fileInput);
                    reader.onload = () => {
                        resolve(reader.result.split(',')[1]);
                    };
                    reader.onerror = error => reject(error);
                });

                // 2. 检查远端是否已存在同名文件（支持覆盖更新）
                btn.innerText = "⏳ 正在校验远端...";
                let fileSha = null;
                const checkRes = await fetch(apiUrl, {
                    headers: { 'Authorization': `token ${tokenInput}` }
                });
                if (checkRes.ok) {
                    const checkData = await checkRes.json();
                    fileSha = checkData.sha;
                }

                // 3. 执行 PUT 上传（文件名为编号.pdf）
                btn.innerText = "🚀 正在上传中...";
                const putBody = {
                    message: `Upload: ${targetFilename}`,
                    content: base64Content,
                    branch: 'master'
                };
                if (fileSha) putBody.sha = fileSha;

                const uploadRes = await fetch(apiUrl, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${tokenInput}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(putBody)
                });

                if (!uploadRes.ok) {
                    const errData = await uploadRes.json();
                    throw new Error(errData.message || '上传异常');
                }

                showStatus(`✅ 上传成功！文件已保存为 ${targetFilename}，CF Pages 约 1 分钟后生效。`, 'success');

            } catch (err) {
                console.error(err);
                showStatus(`❌ 失败: ${err.message}`, 'error');
            } finally {
                btn.innerText = "🚀 上传到仓库";
                btn.disabled = false;
            }
        }
    </script>
</body>

</html>
